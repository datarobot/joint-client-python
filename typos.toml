[type.md]
extend-ignore-re = [
    "(?s)```.*?```",
    "`[^`\\n]+`",
]

[type.tex]
extend-ignore-re = [
    "\\\\cite[a-zA-Z*]*\\{[^}]+\\}",
    "\\\\setsansfont\\{[^}]+\\}",
    "\\\\textit\\{[^}]+\\}",
]