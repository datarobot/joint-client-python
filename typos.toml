# `docs/LANGUAGE.md` remains the source of truth for separator-based house
# style rules that typos cannot encode mechanically, like `pre-training` vs
# `pretraining`. Typos still runs across the full repository to catch repo-wide
# terminology and locale changes.

[files]
extend-exclude = [
    ".env",
    ".git",
    ".venv",
    ".pytest_cache",
    "__pycache__",
    "config.yaml",
    "private",
    "docs/latex/paper/references.bib",
    "logs",
    "results",
    "runs",
    "wandb",
    "**/.mypy_cache",
    "**/.ruff_cache",
    "**/node_modules",
    "**/*.gif",
    "**/*.ipynb",
    "**/*.jpeg",
    "**/*.jpg",
    "**/*.pdf",
    "**/*.png",
    "**/*.pt",
    "**/*.svg",
]
ignore-hidden = false
ignore-files = false
ignore-dot = false
ignore-vcs = false
ignore-global = false
ignore-parent = false

[default]
locale = "en-us"
extend-ignore-re = [
    "Organisation for Economic Co-operation and Development",
    "On the behaviour of commodity prices\\.",
]

