# `docs/LANGUAGE.md` remains the source of truth for separator-based house
# style rules that typos cannot encode mechanically, like `pre-training` vs
# `pretraining`. Typos still runs across the full repository to catch repo-wide
# terminology and locale changes.

[files]
extend-exclude = [
    ".env",
    ".git",
    ".venv",
    ".pytest_cache",
    "__pycache__",
    "config.yaml",
    "private",
    "docs/latex/paper/references.bib",
    "logs",
    "results",
    "runs",
    "wandb",
    "**/.mypy_cache",
    "**/.ruff_cache",
    "**/node_modules",
    "**/*.gif",
    "**/*.ipynb",
    "**/*.jpeg",
    "**/*.jpg",
    "**/*.pdf",
    "**/*.png",
    "**/*.pt",
    "**/*.svg",
]
ignore-hidden = false
ignore-files = false
ignore-dot = false
ignore-vcs = false
ignore-global = false
ignore-parent = false

[default]
locale = "en-us"

[default.extend-words]
"DataRobot" = "DataRobot"
"JointFM" = "JointFM"
"NaN" = "NaN"
"ba" = "ba"
"dtype" = "dtype"
"entrypoint" = "entrypoint"
"metadata" = "metadata"

"analysed" = "analyzed"
"analyse" = "analyze"
"artefact" = "artifact"
"artefacts" = "artifacts"
"behaviour" = "behavior"
"behaviours" = "behaviors"
"categorise" = "categorize"
"favour" = "favor"
"fulfilment" = "fulfillment"
"initialise" = "initialize"
"initialised" = "initialized"
"labelling" = "labeling"
"labelled" = "labeled"
"maximise" = "maximize"
"maximised" = "maximized"
"minimise" = "minimize"
"minimised" = "minimized"
"modelling" = "modeling"
"modelled" = "modeled"
"normalisation" = "normalization"
"normalise" = "normalize"
"normalised" = "normalized"
"optimisation" = "optimization"
"optimise" = "optimize"
"optimised" = "optimized"
"organisation" = "organization"
"organise" = "organize"
"organised" = "organized"
"organising" = "organizing"
"prioritise" = "prioritize"
"prioritised" = "prioritized"
"serialise" = "serialize"
"specialise" = "specialize"
"stabilise" = "stabilize"
"stabilised" = "stabilized"

[default.extend-identifiers]
"DataRobot" = "DataRobot"
"JointFM" = "JointFM"
"jointfm" = "jointfm"
"ba" = "ba"
"dtype" = "dtype"
"entrypoint" = "entrypoint"
"metadata" = "metadata"

[type.md]
extend-ignore-re = [
    "(?s)```.*?```",
    "`[^`\\n]+`",
]