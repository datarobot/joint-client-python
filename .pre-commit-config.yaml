fail_fast: true
exclude: ^private/
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: insert-license
        name: insert license header (python)
        entry: apache/skywalking-eyes:0.8.0 -c .licenserc.yaml header fix
        language: docker_image
        pass_filenames: false
        require_serial: true
        always_run: true
      - id: insert-license-notebooks
        name: insert license header (notebooks)
        entry: uv run python scripts/insert_license_notebooks.py
        language: system
        types: [jupyter]
      - id: commitizen
        name: conventional commit message
        entry: uv run cz check --commit-msg-file
        language: system
        stages: [commit-msg]
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: ty-check
        name: ty check
        entry: task typecheck
        language: system
        pass_filenames: false
      - id: typos
        name: typos
        entry: task typos
        language: system
        pass_filenames: false
      - id: nbstripout
        name: nbstripout
        entry: uv run nbstripout
        language: system
        types: [jupyter]
      - id: tests
        name: tests with coverage
        entry: env COVERAGE_FILE=/tmp/joint-client-python-pre-commit.coverage uv run pytest -q -p no:cacheprovider --cov=jointfm_client --cov-report=term-missing:skip-covered --cov-fail-under=90
        language: system
        pass_filenames: false
        always_run: true